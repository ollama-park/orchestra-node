server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /help {
        proxy_pass http://orchestra-node:8000/help;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://orchestra-node:8000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
