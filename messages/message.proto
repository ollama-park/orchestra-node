syntax = "proto3";

service MessageService {

  rpc GetTask(Empty) returns (TaskReply);

  rpc SendResult(ResultRequest) returns (Empty);

  rpc ProcessTask(TaskReply) returns (TaskReply);
}

message Empty {}

message TaskReply {
  string id = 1;
  string text = 2;
}

message ResultRequest {
  string id = 1;
  string text = 2;
}
